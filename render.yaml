databases:
  - name: bugmind-db
    region: frankfurt
    plan: free
    databaseName: bugmind_v98p
    user: bugmind_admin

services:
  - type: keyvalue
    name: bugmind-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: bugmind-ai-monorepo
    runtime: python
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start_render.sh
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: bugmind-db
          property: connectionString
      - key: DATABASE_EXTERNAL_URL
        sync: false
      - key: ALLOW_DERIVED_DATABASE_EXTERNAL_URL
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: bugmind-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: RATE_LIMITS_ENABLED
        value: "true"
      - key: ALLOW_PRIVATE_JIRA_HOSTS
        value: "false"
      - key: ALLOW_INSECURE_JIRA_SSL
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: PASSWORD_RESET_CODE_EXPIRE_MINUTES
        value: "15"

  - type: worker
    name: bugmind-job-worker
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.services.jobs.worker_main
    maxShutdownDelaySeconds: 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: bugmind-db
          property: connectionString
      - key: DATABASE_EXTERNAL_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: bugmind-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: RATE_LIMITS_ENABLED
        value: "true"
      - key: ALLOW_PRIVATE_JIRA_HOSTS
        value: "false"
      - key: ALLOW_INSECURE_JIRA_SSL
        value: "false"
