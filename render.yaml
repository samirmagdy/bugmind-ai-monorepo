databases:
  - name: bugmind-db
    plan: free
    databaseName: bugmind
    user: bugmind_admin

services:
  - type: web
    name: bugmind-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: bash ./start_render.sh
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DATABASE_URL
        fromDatabase:
          name: bugmind-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: SECRET_KEY
        sync: true  # Changed from false to true
      - key: ENCRYPTION_KEY
        sync: true  # Changed from false to true
      - key: OPENROUTER_API_KEY
        sync: true  # Changed from false to true
      - key: OPENROUTER_MODEL
        sync: true  # Changed from false to true
      - key: CORS_ORIGINS
        sync: true  # Changed from false to true
      - key: ALLOWED_HOSTS
        sync: true  # Changed from false to true
      - key: RATE_LIMITS_ENABLED
        value: "false"
      - key: ALLOW_PRIVATE_JIRA_HOSTS
        value: "false"
      - key: ALLOW_INSECURE_JIRA_SSL
        value: "false"
      - key: STRIPE_SECRET_KEY
        sync: true  # Changed from false to true
      - key: STRIPE_WEBHOOK_SECRET
        sync: true  # Changed from false to true
